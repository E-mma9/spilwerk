<?xml version="1.0" encoding="UTF-8"?>
<!--
  Spilwerk visitekaartje · VOORZIJDE
  Formaat: 91mm × 61mm (85×55 met 3mm bleed rondom)
  Veilige zone: 6mm naar binnen vanaf de rand
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="91mm" height="61mm"
     viewBox="0 0 91 61">

  <!-- Achtergrond (paper-crème) -->
  <rect width="91" height="61" fill="#FBF6EE"/>

  <!-- Veilige zone outline (alleen voor preview, verwijder voor druk) -->
  <!--<rect x="6" y="6" width="79" height="49" fill="none" stroke="#888" stroke-width="0.1" stroke-dasharray="0.5,0.5"/>-->

  <!-- Brand: groen rondje + naam -->
  <circle cx="11" cy="13.5" r="2.4" fill="#4A7C59"/>
  <text x="15.5" y="15"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-size="6.5" font-weight="800"
        letter-spacing="-0.15"
        fill="#2A2A28">SPILWERK</text>

  <!-- Subtitle -->
  <text x="15.5" y="20"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-size="3" font-weight="500"
        fill="#4F4D48">IT-hulp aan huis · heel Overijssel</text>

  <!-- Decoratieve dunne accent-lijn -->
  <line x1="8" y1="34" x2="22" y2="34"
        stroke="#4A7C59" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Naam + functie (onder) -->
  <text x="8" y="49"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-size="3.8" font-weight="700"
        fill="#2A2A28">Emmanuel Tekle</text>
  <text x="8" y="54"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-size="2.7" font-weight="500"
        fill="#807D75">Eigenaar</text>

</svg>
